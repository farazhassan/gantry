name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
      - name: Verify build and tests
        run: |
          go build ./...
          go test ./...
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          args=(--title "$TAG" --generate-notes --verify-tag)
          case "$TAG" in
            *-*) args+=(--prerelease) ;;
          esac
          gh release create "$TAG" "${args[@]}"
